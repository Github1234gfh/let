
{% for i in books %}
	<div class="book {{ i.category }} book__item">
		<h1>{{ i.name_book }}</h1>
		<p>Автор - {{ i.autor }}</p>
		<p>Категория - {{ i.category }}</p>
		<p>дата издания - {{ i.date }}</p>
		<div class="jdkfg">
			<a href="{% url 'delete' i.id %}">Удалить</a>
			<a href="{% url 'edit' i.id %}">Редактировать</a>
		</div>
	</div>
{% endfor %}
