<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="{% static '/css/style.css' %}">
	<title>Document</title>
</head>
<body>
	<div class="container">
		<div class="wrap">
			<div class="reg__block">
				<a href="{% url 'register'%}" class="register">Register</a>
				<a href="{% url 'login'%}" class="register">Log In</a>
			</div>
			<div class="cards">
				{% for key in data %}
					<div class="card">
						<h1 class="title">{{ key.title }}</h1>
						<p class="text">{{ key.text }}</p>
						<p class="text">Date - {{ key.date }}</p>
						<div class="block">
							<a class="jkgf" href="edit/{{ key.id }}/">Edit</a>
							<a class="jkgf" href="delete/{{ key.id }}/">Delete</a>
						</div>
					</div>
				{% endfor %}
			</div>
			<form action="form/">
				<button class="add__btn">Добавить статью</button>
			</form>
		</div>
	</div>
</body>
</html>
